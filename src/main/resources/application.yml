spring:
  application:
    name: CoHab-chat

  threads:
    virtual:
      enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  r2dbc:
    username: ${EVENT_DB_USER:magofrays}
    password: ${EVENT_DB_PASSWORD:labubu}
    url: r2dbc:postgresql://${EVENT_DB_CONTAINER_NAME:localhost}:5433/${EVENT_DB:cohab}

  data:
    redis:
      timeout: ${REDIS_TIMEOUT:60000}
      host: ${REDIS_CONTAINER_NAME:localhost}
      port: ${REDIS_PORT:6379}
    mongodb:
      uri: mongodb://${MONGO_USER:magofrays}:${MONGO_PASSWORD:labubu}@${MONGO_CONTAINER_NAME:localhost}:${MONGO_PORT:27017}/${MONGO_DB:cohab_chat}?authSource=admin
      auto-index-creation: true

  rsocket:
    server:
      port: 7000
      mapping-path: "/rsocket"
      transport: "websocket"

  security:
    jwt:
      public-key: classpath:certs/public.pem
      expires-at: ${EXPIRES_AT:86400}
    cors:
      allowed-origins: ${ALLOWED_ORIGINS:localhost:5173}
      allowed-methods: ${ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

  liquibase:
    enabled: true
    url: jdbc:postgresql://${EVENT_DB_CONTAINER_NAME:localhost}:${EVENT_DB_PORT:5433}/${EVENT_DB:cohab}
    user: ${EVENT_DB_USER:magofrays}
    password: ${EVENT_DB_PASSWORD:labubu}
    change-log: classpath:liquibase/changelog-master.yml


server:
  port: ${COHAB_CHAT_PORT:8082}

kafka:
  topics:
    notification: "notification"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    enabled: true
  show-actuator: true
  writer-with-default-pretty-printer: true

logging:
  level:
    root: ${LOGGING_LEVEL:INFO}
    by.magofrays: ${LOGGING_LEVEL:INFO}
    org.springframework.data.mongodb: ${LOGGING_LEVEL:INFO}
    org.springframework.security: ${LOGGING_LEVEL:INFO}
    org.springframework.web: ${LOGGING_LEVEL:INFO}
    org.springframework.data.r2dbc: ${LOGGING_LEVEL:INFO}
