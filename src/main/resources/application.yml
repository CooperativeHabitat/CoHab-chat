spring:
  application:
    name: CoHab-chat

  threads:
    virtual:
      enabled: true

  kafka:
    bootstrap-servers: localhost:9092

  r2dbc:
    username: magofrays
    password: labubu
    url: r2dbc:postgresql://localhost:5433/cohab

  data:
    redis:
      host: localhost
      port: 6379
    mongodb:
      uri: mongodb://localhost:27017/cohab_chat
      auto-index-creation: true

  rsocket:
    server:
      port: 7000
      mapping-path: "/rsocket"
      transport: "websocket"

  security:
    jwt:
      public-key: classpath:certs/public.pem

  liquibase:
    enabled: true
    url: jdbc:postgresql://localhost:5433/cohab
    user: magofrays
    password: labubu
    change-log: classpath:liquibase/changelog-master.yml


server:
  port: 8082

kafka:
  topics:
    notification: "notification"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    enabled: true
  show-actuator: true
  writer-with-default-pretty-printer: true

logging:
  level:
    root: INFO
    by.magofrays: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.r2dbc: DEBUG
