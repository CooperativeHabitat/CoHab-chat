spring:
  application:
    name: CoHab-chat

  threads:
    virtual:
      enabled: true

  mongodb:
    uri: mongodb://localhost:27017/cohab_chat

  kafka:
    bootstrap-servers: localhost:9092

  datasource:
    username: events
    password: events
    url: jdbc:ch://localhost:8123/events
    driver-class-name: com.clickhouse.jdbc.ClickHouseDriver


  data:
    redis:
      host: localhost
      port: 6379
    mongodb:
      auto-index-creation: true

  rsocket:
    server:
      port: 7000
      mapping-path: "/rsocket"
      transport: "websocket"

  security:
    jwt:
      public-key: classpath:certs/public.pem


server:
  port: 8082

kafka:
  topics:
    notification: "notification"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    enabled: true
  show-actuator: true
  writer-with-default-pretty-printer: true

logging:
  level:
    root: INFO
    by.magofrays: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.r2dbc: DEBUG
